<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDP Browser Simple Client</title>
    <style>
    :root {
      color-scheme: light;
      font-family: 'SF Mono', 'IBM Plex Mono', ui-monospace, monospace;
      background: linear-gradient(180deg, #f7f4ec 0%, #ece8dc 100%);
      color: #1c1a17;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(28, 26, 23, .12);
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(28, 26, 23, .08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    code,
    pre {
      font-family: inherit;
    }
    </style>
  </head>
  <body>
    <main>
      <h1>MDP Browser Simple Client</h1>
      <p>
        This page auto-registers the simple browser MDP client bundle.
      </p>
      <pre><code id="status">Booting…</code></pre>
    </main>

    <script src="/assets/modeldriveprotocol-client.global.js"></script>
    <script>
    const status = document.getElementById('status')

    window.addEventListener('mdp:simple-browser-client:ready', (event) => {
      const client = event.detail?.client

      status.textContent =
        `Connected and registered as ${client?.name ?? 'Browser Simple Client'}. ` +
        'Available tools: browser.getPageBasics, browser.clickElement, browser.alertMessage. ' +
        'Available skills: browser-simple/overview, browser-simple/tools, browser-simple/examples.'
    })

    window.addEventListener('mdp:simple-browser-client:error', (event) => {
      status.textContent = String(event.detail?.message ?? 'Unknown error')
    })
    </script>
    <script
      src="/assets/browser-simple-mdp-client.global.js"
      attr-mdp-server-url="ws://127.0.0.1:47372"
      attr-mdp-client-id="browser-simple-example"
      attr-mdp-client-name="Browser Simple Client"
      attr-mdp-client-description="Minimal browser MDP client for page inspection and interaction"
    ></script>
  </body>
</html>
