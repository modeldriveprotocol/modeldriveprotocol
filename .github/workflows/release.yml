name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          EXPECTED_VERSION="${TAG_NAME#v}"

          for manifest in \
            packages/protocol/package.json \
            packages/client/package.json \
            packages/server/package.json \
            apps/browser-simple-mdp-client/package.json \
            apps/nodejs-simple-mdp-client/package.json
          do
            VERSION=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$manifest")
            if [ "$VERSION" != "$EXPECTED_VERSION" ]; then
              echo "$manifest has version $VERSION but tag expects $EXPECTED_VERSION." >&2
              exit 1
            fi
          done

          echo "value=$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          registry-url: https://registry.npmjs.org

      - name: Build workspace
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish packages
        run: pnpm publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "Model Drive Protocol v$VERSION"
          else
            gh release create "$TAG_NAME" \
              --title "Model Drive Protocol v$VERSION" \
              --generate-notes \
              --verify-tag
          fi
