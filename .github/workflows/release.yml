name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(node scripts/validate-release-versions.mjs "$TAG_NAME")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  release-npm:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          registry-url: https://registry.npmjs.org

      - name: Configure npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          printf "registry=https://registry.npmjs.org/\n" >> "$NPM_CONFIG_USERCONFIG"
          printf "always-auth=true\n" >> "$NPM_CONFIG_USERCONFIG"
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" >> "$NPM_CONFIG_USERCONFIG"
          printf "//registry.npmjs.com/:_authToken=%s\n" "$NODE_AUTH_TOKEN" >> "$NPM_CONFIG_USERCONFIG"

      - name: Build workspace
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish packages
        run: pnpm publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  release-python-sdk:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and test Python SDK
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]' build twine
          pytest -q
          python -m build

      - name: Publish Python SDK
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        working-directory: sdks/python
        run: |
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "Skipping PyPI publish because PYPI_API_TOKEN is not configured."
            exit 0
          fi

          python -m twine upload --non-interactive -u __token__ -p "$PYPI_API_TOKEN" dist/*

  release-rust-sdk:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Package Rust SDK
        run: |
          cargo test --manifest-path sdks/rust/Cargo.toml
          cargo package --manifest-path sdks/rust/Cargo.toml

      - name: Publish Rust SDK
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Skipping crates.io publish because CARGO_REGISTRY_TOKEN is not configured."
            exit 0
          fi

          cargo publish --manifest-path sdks/rust/Cargo.toml --token "$CARGO_REGISTRY_TOKEN"

  release-go-sdk:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test Go SDK
        working-directory: sdks/go
        run: go test ./...

      - name: Publish Go module tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          GO_TAG="sdks/go/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-list -n 1 "$GO_TAG")
            if [ "$EXISTING_SHA" != "$TARGET_SHA" ]; then
              echo "Go module tag $GO_TAG already points to $EXISTING_SHA, expected $TARGET_SHA."
              exit 1
            fi
            echo "Go module tag $GO_TAG already exists on the release commit."
            exit 0
          fi

          git tag "$GO_TAG" "$TARGET_SHA"
          git push origin "$GO_TAG"

  release-jvm-sdks:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build JVM SDKs
        run: gradle -p sdks/jvm build

      - name: Publish JVM SDKs
        env:
          MAVEN_PUBLISH_URL: ${{ secrets.MAVEN_PUBLISH_URL }}
          MAVEN_PUBLISH_USERNAME: ${{ secrets.MAVEN_PUBLISH_USERNAME }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PUBLISH_PASSWORD }}
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          if [ -z "${MAVEN_PUBLISH_URL:-}" ] || [ -z "${MAVEN_PUBLISH_USERNAME:-}" ] || [ -z "${MAVEN_PUBLISH_PASSWORD:-}" ]; then
            echo "Skipping JVM SDK publish because MAVEN_PUBLISH_URL, MAVEN_PUBLISH_USERNAME, or MAVEN_PUBLISH_PASSWORD is not configured."
            exit 0
          fi

          gradle -p sdks/jvm publish

  release-dotnet-sdk:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and pack .NET SDK
        run: |
          dotnet test sdks/dotnet/ModelDriveProtocol.sln
          dotnet pack sdks/dotnet/src/ModelDriveProtocol.Client/ModelDriveProtocol.Client.csproj -c Release -o sdks/dotnet/artifacts

      - name: Publish .NET SDK
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "Skipping NuGet publish because NUGET_API_KEY is not configured."
            exit 0
          fi

          dotnet nuget push sdks/dotnet/artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  github-release:
    needs:
      - validate
      - release-npm
      - release-python-sdk
      - release-rust-sdk
      - release-go-sdk
      - release-jvm-sdks
      - release-dotnet-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "Model Drive Protocol v$VERSION"
          else
            gh release create "$TAG_NAME" \
              --title "Model Drive Protocol v$VERSION" \
              --generate-notes \
              --verify-tag
          fi
