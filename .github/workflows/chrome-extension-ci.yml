name: Chrome Extension CI

on:
  pull_request:
    paths:
      - ".github/workflows/chrome-extension-ci.yml"
      - ".github/workflows/chrome-extension-release.yml"
      - ".github/actions/setup-workspace/**"
      - ".github/actions/build-workspace-package-deps/**"
      - "apps/chrome-extension/**"
      - "packages/client/**"
      - "packages/protocol/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vitest.config.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/chrome-extension-ci.yml"
      - ".github/workflows/chrome-extension-release.yml"
      - ".github/actions/setup-workspace/**"
      - ".github/actions/build-workspace-package-deps/**"
      - "apps/chrome-extension/**"
      - "packages/client/**"
      - "packages/protocol/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vitest.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chrome-extension-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/package.json', 'utf8')).version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=apps/chrome-extension/dist/mdp-chrome-extension-v$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension test

      - name: Build workspace package dependencies
        uses: ./.github/actions/build-workspace-package-deps

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension build

      - name: Validate generated manifest version
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: |
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/dist/chrome-mv3/manifest.json', 'utf8')).version")
          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Generated manifest version ($MANIFEST_VERSION) does not match package version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Package extension
        env:
          ARCHIVE_PATH: ${{ steps.version.outputs.archive }}
        run: |
          rm -f "$ARCHIVE_PATH"
          cd apps/chrome-extension/dist/chrome-mv3
          zip -r "../$(basename "$ARCHIVE_PATH")" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-chrome-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14
