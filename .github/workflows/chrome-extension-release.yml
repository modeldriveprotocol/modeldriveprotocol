name: Chrome Extension Release

on:
  push:
    tags:
      - "chrome-extension-v*"

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.value }}
      archive_file: mdp-chrome-extension-v${{ steps.version.outputs.value }}.zip
      artifact_name: mdp-chrome-extension-v${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/package.json', 'utf8')).version")
          TAG_VERSION="${TAG_NAME#chrome-extension-v}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match extension version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=apps/chrome-extension/mdp-chrome-extension-v$PACKAGE_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension test

      - name: Build workspace package dependencies
        uses: ./.github/actions/build-workspace-package-deps

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension build

      - name: Validate generated manifest version
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: |
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/dist/chrome-mv3/manifest.json', 'utf8')).version")
          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Generated manifest version ($MANIFEST_VERSION) does not match package version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Package extension
        env:
          ARCHIVE_PATH: ${{ steps.version.outputs.archive }}
        run: |
          rm -f "$ARCHIVE_PATH"
          cd apps/chrome-extension/dist/chrome-mv3
          zip -r "../$(basename "$ARCHIVE_PATH")" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-chrome-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download packaged extension
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish to Chrome Web Store
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          CHROME_WEB_STORE_CLIENT_ID: ${{ secrets.CHROME_WEB_STORE_CLIENT_ID }}
          CHROME_WEB_STORE_CLIENT_SECRET: ${{ secrets.CHROME_WEB_STORE_CLIENT_SECRET }}
          CHROME_WEB_STORE_EXTENSION_ID: ${{ vars.CHROME_WEB_STORE_EXTENSION_ID }}
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ vars.CHROME_WEB_STORE_PUBLISHER_ID }}
          CHROME_WEB_STORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEB_STORE_REFRESH_TOKEN }}
        run: |
          for required in \
            CHROME_WEB_STORE_EXTENSION_ID \
            CHROME_WEB_STORE_PUBLISHER_ID \
            CHROME_WEB_STORE_CLIENT_ID \
            CHROME_WEB_STORE_CLIENT_SECRET \
            CHROME_WEB_STORE_REFRESH_TOKEN
          do
            if [ -z "${!required}" ]; then
              echo "Skipping Chrome Web Store publish because $required is not configured."
              exit 0
            fi
          done

          ACCESS_TOKEN_RESPONSE=$(curl --fail-with-body -sS https://oauth2.googleapis.com/token \
            -d "client_id=$CHROME_WEB_STORE_CLIENT_ID" \
            -d "client_secret=$CHROME_WEB_STORE_CLIENT_SECRET" \
            -d "refresh_token=$CHROME_WEB_STORE_REFRESH_TOKEN" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(node -e "
            const data = JSON.parse(process.argv[1]);
            if (!data.access_token) {
              console.error('OAuth token response did not include access_token.');
              process.exit(1);
            }
            process.stdout.write(data.access_token);
          " "$ACCESS_TOKEN_RESPONSE")

          ITEM_NAME="publishers/$CHROME_WEB_STORE_PUBLISHER_ID/items/$CHROME_WEB_STORE_EXTENSION_ID"

          UPLOAD_RESPONSE=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T "$ARCHIVE_PATH" \
            "https://chromewebstore.googleapis.com/upload/v2/$ITEM_NAME:upload")

          UPLOAD_STATE=$(node -e "
            const data = JSON.parse(process.argv[1]);
            if (!data.uploadState) {
              console.error('Upload response did not include uploadState.');
              process.exit(1);
            }
            process.stdout.write(data.uploadState);
          " "$UPLOAD_RESPONSE")

          if [ "$UPLOAD_STATE" = "IN_PROGRESS" ]; then
            echo "Chrome Web Store upload is processing asynchronously. Polling status."
            for attempt in $(seq 1 12); do
              sleep 10
              STATUS_RESPONSE=$(curl --fail-with-body -sS \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                "https://chromewebstore.googleapis.com/v2/$ITEM_NAME:fetchStatus")

              UPLOAD_STATE=$(node -e "
                const data = JSON.parse(process.argv[1]);
                process.stdout.write(data.lastAsyncUploadState || 'NOT_FOUND');
              " "$STATUS_RESPONSE")

              echo "Chrome Web Store upload state: $UPLOAD_STATE"

              if [ "$UPLOAD_STATE" = "SUCCEEDED" ]; then
                break
              fi

              if [ "$UPLOAD_STATE" = "FAILED" ]; then
                echo "Chrome Web Store upload failed." >&2
                exit 1
              fi
            done
          fi

          if [ "$UPLOAD_STATE" != "SUCCEEDED" ]; then
            echo "Chrome Web Store upload did not reach SUCCEEDED. Final state: $UPLOAD_STATE" >&2
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{}' \
            "https://chromewebstore.googleapis.com/v2/$ITEM_NAME:publish")

          PUBLISH_STATE=$(node -e "
            const data = JSON.parse(process.argv[1]);
            if (!data.state) {
              console.error('Publish response did not include state.');
              process.exit(1);
            }
            process.stdout.write(data.state);
          " "$PUBLISH_RESPONSE")

          case "$PUBLISH_STATE" in
            PENDING_REVIEW|STAGED|PUBLISHED|PUBLISHED_TO_TESTERS)
              ;;
            *)
              echo "Chrome Web Store publish returned unexpected state: $PUBLISH_STATE" >&2
              exit 1
              ;;
          esac

          echo "Chrome Web Store publish state: $PUBLISH_STATE"

      - name: Create or update GitHub release
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "Chrome Extension v$VERSION" \
              --notes "Packaged Chrome extension build for v$VERSION."
          fi
