name: Chrome Extension Release

on:
  push:
    tags:
      - "chrome-extension-v*"

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/src/manifest.json', 'utf8')).version")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/package.json', 'utf8')).version")
          TAG_VERSION="${TAG_NAME#chrome-extension-v}"

          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Manifest version ($MANIFEST_VERSION) does not match package version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match extension version ($MANIFEST_VERSION)." >&2
            exit 1
          fi

          echo "value=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=apps/chrome-extension/mdp-chrome-extension-v$MANIFEST_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension test

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension build

      - name: Package extension
        env:
          ARCHIVE_PATH: ${{ steps.version.outputs.archive }}
        run: |
          rm -f "$ARCHIVE_PATH"
          cd apps/chrome-extension/dist
          zip -r "../$(basename "$ARCHIVE_PATH")" .

      - name: Create or update GitHub release
        env:
          ARCHIVE_PATH: ${{ steps.version.outputs.archive }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "Chrome Extension v$VERSION" \
              --notes "Packaged Chrome extension build for v$VERSION."
          fi
