name: Chrome Extension Release

on:
  push:
    tags:
      - "chrome-extension-v*"

permissions:
  contents: write

concurrency:
  group: chrome-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.value }}
      archive_file: mdp-chrome-extension-v${{ steps.version.outputs.value }}.zip
      artifact_name: mdp-chrome-extension-v${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/package.json', 'utf8')).version")
          TAG_VERSION="${TAG_NAME#chrome-extension-v}"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match extension version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=apps/chrome-extension/mdp-chrome-extension-v$PACKAGE_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension test

      - name: Build workspace package dependencies
        uses: ./.github/actions/build-workspace-package-deps

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/chrome-extension build

      - name: Validate generated manifest version
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: |
          MANIFEST_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/chrome-extension/dist/chrome-mv3/manifest.json', 'utf8')).version")
          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Generated manifest version ($MANIFEST_VERSION) does not match package version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Package extension
        env:
          ARCHIVE_PATH: ${{ steps.version.outputs.archive }}
        run: |
          rm -f "$ARCHIVE_PATH"
          cd apps/chrome-extension/dist/chrome-mv3
          zip -r "../$(basename "$ARCHIVE_PATH")" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-chrome-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download packaged extension
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Create or update GitHub release
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "Chrome Extension v$VERSION" \
              --notes "Packaged Chrome extension build for v$VERSION."
          fi
