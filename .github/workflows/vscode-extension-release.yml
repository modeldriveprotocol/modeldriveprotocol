name: VSCode Extension Release

on:
  push:
    tags:
      - "vscode-extension-v*"

permissions:
  contents: write

concurrency:
  group: vscode-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.value }}
      archive_file: mdp-vscode-extension-v${{ steps.version.outputs.value }}.vsix
      artifact_name: mdp-vscode-extension-v${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Validate release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
          VSCODE_EXTENSION_PUBLISHER: ${{ vars.VSCODE_EXTENSION_PUBLISHER }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/vscode-extension/package.json', 'utf8')).version")
          TAG_VERSION="${TAG_NAME#vscode-extension-v}"

          if [ -z "$VSCODE_EXTENSION_PUBLISHER" ]; then
            echo "Missing repository variable VSCODE_EXTENSION_PUBLISHER." >&2
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VSCode extension version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "file=mdp-vscode-extension-v$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "archive=apps/vscode-extension/mdp-vscode-extension-v$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension test

      - name: Build workspace package dependencies
        uses: ./.github/actions/build-workspace-package-deps

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension build

      - name: Package VSIX
        env:
          VSCODE_EXTENSION_PUBLISHER: ${{ vars.VSCODE_EXTENSION_PUBLISHER }}
          ARCHIVE_FILE: ${{ steps.version.outputs.file }}
        run: pnpm --filter @modeldriveprotocol/vscode-extension package:vsix -- --out "$ARCHIVE_FILE"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-vscode-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Download packaged extension
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish to VS Code Marketplace
        env:
          VSCODE_EXTENSION_PUBLISHER: ${{ vars.VSCODE_EXTENSION_PUBLISHER }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          ARCHIVE_FILE: dist/${{ needs.build.outputs.archive_file }}
        run: pnpm --filter @modeldriveprotocol/vscode-extension publish:vsix -- --packagePath "$ARCHIVE_FILE"

      - name: Create or update GitHub release
        env:
          ARCHIVE_PATH: dist/${{ needs.build.outputs.archive_file }}
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ARCHIVE_PATH" \
              --title "VSCode Extension v$VERSION" \
              --notes "Packaged VSCode extension build for v$VERSION."
          fi
