name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Build workspace
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Build docs
        run: pnpm docs:build

  verify-python-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python SDK dependencies
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run Python SDK tests
        working-directory: sdks/python
        run: pytest -q

  verify-rust-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Run Rust SDK tests
        run: cargo test --manifest-path sdks/rust/Cargo.toml

  verify-go-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run Go SDK tests
        working-directory: sdks/go
        run: go test ./...

  verify-jvm-sdks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Run JVM SDK tests
        run: gradle -p sdks/jvm test

  verify-dotnet-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run .NET SDK tests
        run: dotnet test sdks/dotnet/ModelDriveProtocol.sln
