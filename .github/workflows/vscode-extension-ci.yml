name: VSCode Extension CI

on:
  pull_request:
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - ".github/workflows/vscode-extension-release.yml"
      - ".github/actions/setup-workspace/**"
      - ".github/actions/build-workspace-package-deps/**"
      - "apps/vscode-extension/**"
      - "packages/client/**"
      - "packages/protocol/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vitest.config.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vscode-extension-ci.yml"
      - ".github/workflows/vscode-extension-release.yml"
      - ".github/actions/setup-workspace/**"
      - ".github/actions/build-workspace-package-deps/**"
      - "apps/vscode-extension/**"
      - "packages/client/**"
      - "packages/protocol/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vitest.config.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vscode-extension-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('apps/vscode-extension/package.json', 'utf8')).version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file=mdp-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"
          echo "archive=apps/vscode-extension/mdp-vscode-extension-v$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Typecheck extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension typecheck

      - name: Test extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension test

      - name: Build workspace package dependencies
        uses: ./.github/actions/build-workspace-package-deps

      - name: Build extension
        run: pnpm --filter @modeldriveprotocol/vscode-extension build

      - name: Package VSIX
        env:
          VSCODE_EXTENSION_PUBLISHER: localdev
          ARCHIVE_FILE: ${{ steps.version.outputs.file }}
        run: pnpm --filter @modeldriveprotocol/vscode-extension package:vsix -- --out "$ARCHIVE_FILE"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-vscode-extension-v${{ steps.version.outputs.value }}
          path: ${{ steps.version.outputs.archive }}
          if-no-files-found: error
          retention-days: 14
