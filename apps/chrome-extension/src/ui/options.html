<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDP Chrome Extension Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="surface surface-wide">
    <main class="panel panel-wide">
      <section class="hero">
        <p class="eyebrow">Model Drive Protocol</p>
        <h1>Chrome Extension Runtime</h1>
        <p class="lede">
          Configure the extension client, define the page match patterns that may receive
          injected scripts, and persist the default page-side tool bootstrap.
        </p>
      </section>

      <form id="settings-form" class="form-grid">
        <label class="field">
          <span>MDP Server URL</span>
          <input id="serverUrl" type="url" placeholder="ws://127.0.0.1:7070" />
        </label>

        <label class="field">
          <span>Client ID</span>
          <input id="clientId" type="text" />
        </label>

        <label class="field">
          <span>Client Name</span>
          <input id="clientName" type="text" />
        </label>

        <label class="field">
          <span>Client Description</span>
          <input id="clientDescription" type="text" />
        </label>

        <label class="field">
          <span>Notification Title</span>
          <input id="notificationTitle" type="text" />
        </label>

        <label class="field field-wide">
          <span>Target Match Patterns</span>
          <textarea
            id="matchPatterns"
            rows="6"
            placeholder="https://app.example.com/*&#10;https://admin.example.com/*"
          ></textarea>
          <small>One Chrome match pattern per line. Saving requests host permissions.</small>
        </label>

        <label class="field field-toggle">
          <input id="autoConnect" type="checkbox" />
          <span>Auto-connect background service worker to the MDP server</span>
        </label>

        <label class="field field-toggle">
          <input id="autoInjectBridge" type="checkbox" />
          <span>Auto-inject the main-world bridge and default tool script on matched pages</span>
        </label>

        <label class="field field-wide">
          <span>Default Tool Script</span>
          <textarea
            id="toolScriptSource"
            rows="14"
            placeholder="window.__MDP_EXTENSION_BRIDGE__.registerTool(&quot;readAppState&quot;, () =&gt; window.app.store.getState());"
          ></textarea>
          <small>
            This code runs in the page main world and can register tools through
            <code>window.__MDP_EXTENSION_BRIDGE__</code>.
          </small>
        </label>

        <div class="actions">
          <button type="submit">Save Settings</button>
          <button id="refresh-runtime" type="button" class="button-secondary">
            Refresh Runtime
          </button>
        </div>
      </form>

      <section class="subpanel">
        <h2>Granted Origins</h2>
        <ul id="granted-origins" class="mono-list"></ul>
      </section>

      <section class="subpanel">
        <h2>Configured Patterns Missing Access</h2>
        <ul id="missing-origins" class="mono-list"></ul>
      </section>

      <p id="status" class="status" data-state="idle">
        Changes are applied after saving.
      </p>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
