<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Drive Protocol for Chrome</title>
    <meta name="manifest.type" content="action" />
  </head>
  <body class="surface surface-popup">
    <main class="panel panel-popup">
      <section class="hero hero-compact">
        <p class="eyebrow">MDP</p>
        <h1>MDP for Chrome</h1>
      </section>

      <section class="subpanel">
        <h2>Connection</h2>
        <pre id="connection-status" class="mono-block">Loading…</pre>
      </section>

      <section class="subpanel">
        <h2>Active Tab</h2>
        <pre id="active-tab" class="mono-block">Loading…</pre>
        <pre id="active-origin" class="mono-block muted"></pre>
      </section>

      <section class="subpanel">
        <h2>Config</h2>
        <pre id="config-summary" class="mono-block">Loading…</pre>
      </section>

      <section class="subpanel">
        <h2>Bridge State</h2>
        <pre id="bridge-state" class="mono-block">Loading…</pre>
      </section>

      <section class="subpanel">
        <h2>Injected Tools</h2>
        <ul id="tool-list" class="mono-list"></ul>
      </section>

      <div class="actions actions-compact">
        <button id="refresh" type="button">Refresh</button>
        <button id="grant-active-site" type="button" class="button-secondary">
          Grant Site
        </button>
        <button id="inject" type="button" class="button-secondary">
          Inject Active Tab
        </button>
        <button id="open-options" type="button" class="button-secondary">
          Options
        </button>
      </div>

      <p id="message" class="status" data-state="idle"></p>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
